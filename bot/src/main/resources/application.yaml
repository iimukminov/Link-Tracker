server:
  port: 8080

spring:
  application:
    name: bot
  config:
    import:
      - optional:file:bot/config/messages.yml
      - optional:file:config/messages.yml

app:
  telegram:
    url: https://api.telegram.org/bot
    token: ${TELEGRAM_BOT_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    update-listener-sleep: 1s
    debug: false

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m %clr(%kvp){yellow}%n%wEx"
