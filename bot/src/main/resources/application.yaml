server:
  port: 8080

spring:
  application:
    name: bot
  config:
    import:
      - optional:file:bot/config/messages.yml
      - optional:file:config/messages.yml

app:
  telegram:
    url: https://api.telegram.org/bot
    token: ${TELEGRAM_BOT_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    update-listener-sleep: 1s
    debug: false
