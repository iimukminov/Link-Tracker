bot:
  messages:
    start: "Добро пожаловать! Используйте /help"
    help: |
      Доступные команды:
      /start - Запуск бота
      /help - Справка
      /track - Отслеживать ссылку
      /untrack [ссылка] - Прекратить отслеживание
      /list [тег] - Список ссылок
    wrong: "Неизвестная команда. Используйте /help"
    cancel: "Текущее действие отменено"

    track:
      linkRequest: "Отправьте ссылку для отслеживания (GitHub/StackOverflow)"
      invalidLink: "Некорректная ссылка. Поддерживаются GitHub/StackOverflow"
      alreadyTracked: "Ссылка уже отслеживается"
      tagRequest: "Теги (через запятую, опционально) или /cancel"
      success: "Ссылка добавлена в отслеживание"
      alreadyInProcess: "Вы уже находитесь в процессе добавления ссылки. Пожалуйста, завершите его или введите /cancel"
      lostLink: "Произошла ошибка, ссылка потерялась. Начните сначала: /track"
      error: "Произошла ошибка при сохранении ссылки на сервере"

    untrack:
      success: "Отслеживание прекращено"
      notFound: "Ссылка не найдена в отслеживании"
      usage: "Пожалуйста, укажите ссылку для удаления. Пример:\n/untrack https://github.com/user/repo"
      invalidFormat: "Некорректный формат ссылки"
      error: "Произошла ошибка при удалении ссылки"

    listMsg:
      empty: "У вас нет отслеживаемых ссылок"
      title: "Ваши ссылки:"
      error: "Произошла ошибка при получении списка ссылок"

    update: "<b>Новое обновление!</b>%n%n%s%nСсылка: %s"
    badRequest: "Некорректные параметры запроса"
